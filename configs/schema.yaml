# tinypowers Feature Schema
# 定义 feature 工作流中的 artifact 类型、依赖关系和阶段归属
#
# 此文件允许项目 fork 并自定义工作流。
# fork 后可通过 `node scripts/validate.js --schema configs/schema.yaml` 校验自定义 schema。

version: "1.0"

# 阶段定义（从左到右为生命周期顺序）
phases:
  - id: INIT
    name: 初始化
    description: 创建 feature 目录和基础状态文件
  - id: REQ
    name: 需求分析
    description: PRD 撰写和需求理解确认
  - id: DESIGN
    name: 技术方案
    description: 技术方案设计和决策锁定
  - id: TASKS
    name: 任务拆解
    description: 将方案拆解为可执行的 Wave/Task
  - id: EXEC
    name: 执行
    description: Wave 并行执行和质量门禁
  - id: REVIEW
    name: 审查
    description: 方案符合性、安全和代码质量审查
  - id: VERIFY
    name: 验证
    description: 端到端验收和测试报告
  - id: CLOSED
    name: 关闭
    description: 归档和知识积累

# Artifact 类型定义
artifacts:
  - id: CHANGESET
    name: Change Set
    generates: CHANGESET.md
    phase: INIT
    requires: []
    description: Feature 目录入口和组织信息

  - id: SPEC-STATE
    name: Spec State
    generates: SPEC-STATE.md
    phase: INIT
    requires: []
    description: 生命周期状态机，追踪当前阶段

  - id: PRD
    name: PRD
    generates: PRD.md
    phase: REQ
    requires: []
    description: 产品需求文档，含 EARS 格式验收标准

  - id: REQUIREMENTS-CONFIRMATION
    name: 需求理解确认
    generates: 需求理解确认.md
    phase: REQ
    requires: [PRD]
    description: 歧义检测和需求理解摘要

  - id: TECH-DESIGN
    name: 技术方案
    generates: 技术方案.md
    phase: DESIGN
    requires: [PRD, REQUIREMENTS-CONFIRMATION]
    description: 架构设计、接口契约、DDL、决策记录

  - id: TASK-BREAKDOWN
    name: 任务拆解表
    generates: 任务拆解表.md
    phase: TASKS
    requires: [TECH-DESIGN]
    description: Wave/Task 分解，含验收标准和依赖关系

  - id: STATE
    name: Execution State
    generates: STATE.md
    phase: EXEC
    requires: [TASK-BREAKDOWN]
    description: 执行期状态，跟踪 Wave 进度和阻塞项

  - id: CODE-REVIEW
    name: 代码审查报告
    generates: code-review.md
    phase: REVIEW
    requires: [STATE]
    description: 三阶段审查（方案符合性/安全/质量）的结论报告

  - id: TEST-REPORT
    name: 测试报告
    generates: 测试报告.md
    phase: VERIFY
    requires: [STATE]
    description: 覆盖率、测试结果和质量门禁结论

  - id: VERIFICATION
    name: 验收报告
    generates: VERIFICATION.md
    phase: VERIFY
    requires: [STATE, CODE-REVIEW, TEST-REPORT]
    description: 端到端验证结论，PASS/FAIL 最终裁决

  - id: LEARNINGS
    name: 智慧积累
    generates: notepads/learnings.md
    phase: EXEC
    requires: [TASK-BREAKDOWN]
    description: 每个 Wave 的智慧积累，可复用知识库
    optional: true

# 默认 phase 推进规则
# 到达某 phase 的前置条件：必须存在其 requires 中所有 artifact
phasePrerequisites:
  REQ:
    artifacts: [PRD]
    confirmation: true
  DESIGN:
    artifacts: [PRD, REQUIREMENTS-CONFIRMATION]
    confirmation: true
  TASKS:
    artifacts: [TECH-DESIGN]
    confirmation: true
  EXEC:
    artifacts: [TASK-BREAKDOWN]
    confirmation: false
  REVIEW:
    artifacts: [STATE]
    confirmation: false
  VERIFY:
    artifacts: [STATE, CODE-REVIEW]
    confirmation: false
  CLOSED:
    artifacts: [VERIFICATION]
    confirmation: true

# schema 自定义说明
# 如需自定义工作流（例如跳过 REQ 阶段的简化为快速 PRD）：
# 1. 复制此文件为 configs/schema.custom.yaml
# 2. 修改 phases 和 artifacts
# 3. 更新 phasePrerequisites
# 4. validate.js 会优先使用 configs/schema.custom.yaml（如果存在）
